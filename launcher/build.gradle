//         "-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005"
//     ]
// }

tasks.withType(JavaExec).configureEach {
    if (project.hasProperty("debug")) {
        jvmArgs += [
            "-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005"
        ]
    }
}