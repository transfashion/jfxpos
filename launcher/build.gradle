plugins {
    id 'application'
    id 'org.openjfx.javafxplugin'
	id 'org.beryx.jlink' version '3.0.1'
}


// taabahkan dependency
dependencies {
    implementation project(':jfxpos')
}

javafx {
    version = "21"
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
	mainModule = 'launcher' 
    mainClass = 'launcher.Launcher'
}


jlink {
    moduleName = application.mainModule
    mainClass = application.mainClass
    
	launcher {
        name = 'jfxpos'
    }

	jpackage {
        imageName = 'jfxpos'
        installerType = 'exe'
        appVersion = '1.0.0'
        if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
            icon = file('src/main/resources/bag.ico')
        }
    }
}

// Copy jfxpos.jar ke direktori app di dalam hasil jpackageImage
tasks.named('jpackageImage') {
    doLast {
        def imageAppDir = layout.buildDirectory.dir("jpackage/jfxpos/app").get().asFile
        copy {
            from project(':jfxpos').tasks.named('jar').get().archiveFile
            into imageAppDir
        }
        println "jfxpos.jar copied to: ${imageAppDir}"
    }
}

run {
    workingDir = rootProject.projectDir
}

jar {
    archiveFileName = 'launcher.jar'
    manifest {
        attributes 'Main-Class': 'launcher.Launcher'
    }
}


tasks.withType(JavaExec).configureEach {
    if (project.hasProperty("debug")) {
        jvmArgs += [
            "-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005"
        ]
    }
}

