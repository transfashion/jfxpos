plugins {
    id 'application'
    id 'org.openjfx.javafxplugin'
	id 'org.beryx.jlink' version '3.2.0'
}


// taabahkan dependency
dependencies {
    implementation project(':jfxpos')
}

javafx {
    version = "21"
    modules = [ 'javafx.controls', 'javafx.fxml' ]
}

application {
	mainModule = 'launcher' 
    mainClass = 'launcher.Launcher'
    


}


jlink {
    // moduleName = 'launcher'
	// mainClass = 'launcher.Launcher'
	moduleName = application.mainModule
	mainClass = application.mainClass

    launcher {
        name = 'jfxpos'
    }



    jpackage {
        imageName = 'jfxpos'
        installerType = 'exe'
        appVersion = '1.0.0'

		if (org.gradle.internal.os.OperatingSystem.current().isWindows()) {
			icon = file('src/main/resources/bag.ico')
		}
	}


}

run {
    workingDir = rootProject.projectDir
}

jar {
    archiveFileName = 'launcher.jar'
    manifest {
        attributes 'Main-Class': 'launcher.Launcher'
    }
}


tasks.withType(JavaExec).configureEach {
    if (project.hasProperty("debug")) {
        jvmArgs += [
            "-agentlib:jdwp=transport=dt_socket,server=y,suspend=y,address=*:5005"
        ]
    }
}




// Task untuk menyalin jfxpos.jar ke folder image/app sebelum jpackage
task copyJfxposJar(type: Copy) {
    def imageAppDir = file("${buildDir}/jlink/image/app")
    from project(':jfxpos').tasks.named('jar').get().archiveFile.get().asFile
    into imageAppDir
}

// Pastikan copy dijalankan sebelum jpackageImage
tasks.named('jpackageImage') {
    dependsOn copyJfxposJar
}